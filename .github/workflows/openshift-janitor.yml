name: OpenShift Lab Janitor (72-Hour Cap)

on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day at midnight UTC
  workflow_dispatch:

jobs:
  cleanup-expired-clusters:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download OpenShift Installer
        run: |
          wget https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-install-linux.tar.gz
          tar xvf openshift-install-linux.tar.gz
          sudo mv openshift-install /usr/local/bin/

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_CREDENTIALS }}'
          
      - name: Map Credentials for OpenShift
        run: |
          # The step above automatically generated the file and set GOOGLE_APPLICATION_CREDENTIALS.
          # GOOGLE_APPLICATION_CREDENTIALS for gsutil, GOOGLE_CREDENTIALS for openshift-install
          # Now, we just tell the OpenShift installer to look at that exact same file. 
          # >> appends a new line to the file without overwriting the file, > overwrites the file

          echo "GOOGLE_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS" >> $GITHUB_ENV


          # In GitHub Actions, if you just run export VAR=VALUE in one step, the next step in your pipeline will forget it completely. 
          # You have to write variables to a special system file called $GITHUB_ENV to make them stick around for the whole job.

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Find and Destroy Expired Clusters
        env:
          RH_API_TOKEN: ${{ secrets.RH_API_TOKEN }}
        run: |
          BUCKET="gs://${{ secrets.GCP_STATE_BUCKET }}"
          NOW=$(date +%s) # Current time in Unix epoch format
          MAX_AGE_SECONDS=$((72 * 3600)) #  259,200seconds

          echo "Checking for clusters older than 72 hours in $BUCKET..."

          gsutil ls "$BUCKET/**/metadata.json" | while read -r metadata_path; do
            FILE_TIME_RAW=$(gsutil stat "$metadata_path" | grep "Update time:" | awk '{print $3, $4, $5, $6, $7}')
            FILE_TIME=$(date -d "$FILE_TIME_RAW" +%s)
            AGE=$((NOW - FILE_TIME))

            CLUSTER_NAME=$(echo "$metadata_path" | awk -F'/' '{print $(NF-1)}')

            if [ "$AGE" -gt "$MAX_AGE_SECONDS" ]; then
              echo "Cluster '$CLUSTER_NAME' is older than 72 hours. Initiating destruction..."
              
              mkdir -p "workspace_$CLUSTER_NAME"
              gsutil cp "$metadata_path" "workspace_$CLUSTER_NAME/metadata.json"

              echo "Releasing Red Hat Entitlements to the pool..."
              
              ACCESS_TOKEN=$(curl -s -X POST https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token \
                -d grant_type=refresh_token \
                -d client_id=cloud-services \
                -d refresh_token=$RH_API_TOKEN | jq -r .access_token)
              
              CLUSTER_ID=$(jq -r .clusterID "workspace_$CLUSTER_NAME/metadata.json")
              
              if [ -n "$CLUSTER_ID" ] && [ "$CLUSTER_ID" != "null" ]; then
                echo "Sending DELETE request to Red Hat API for ID: $CLUSTER_ID"
                curl -s -X DELETE "https://api.openshift.com/api/clusters_mgmt/v1/clusters/$CLUSTER_ID" \
                  -H "Authorization: Bearer $ACCESS_TOKEN"
                echo "Successfully returned licenses."
              else
                echo "Warning: No clusterID found. Skipping Red Hat API deregistration."
              fi
              
              openshift-install destroy cluster --dir="workspace_$CLUSTER_NAME" --log-level=info
              
              gsutil rm -r "$BUCKET/$CLUSTER_NAME/"
              echo "Cluster '$CLUSTER_NAME' successfully destroyed."
            else
              echo "Cluster '$CLUSTER_NAME' is safe. Age is $((AGE / 3600)) hours."
            fi
          done