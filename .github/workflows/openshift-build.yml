name: Provision OpenShift Lab

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Name of your cluster (e.g., dev-lab-1)'
        required: true
        type: string
      acknowledgment:
        description: 'NOTE: This cluster will be automatically deleted in 72 hours. Please reach out to Shrey Raut via Slack if you need it running longer. Acknowledge the same to continue the build.'
        required: true
        type: boolean
        default: false

jobs:
  build-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Acknowledgment
        run: |
          if [ "${{ inputs.acknowledgment }}" != "true" ]; then
            echo "Error: You must acknowledge the 72-hour deletion policy."
            exit 1
          fi

      - name: Download OpenShift Installer
        run: |
          wget https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-install-linux.tar.gz
          tar xvf openshift-install-linux.tar.gz
          sudo mv openshift-install /usr/local/bin/

      - name: Generate install-config.yaml
        env:
          CLUSTER_NAME: ${{ inputs.cluster_name }}
          # Hardcoding worker count
          WORKER_COUNT: 2
          # Hardcoding machine type and gcp region values
          WORKER_MACHINE_TYPE: 'e2-standard-4'
          GCP_REGION: 'us-central1'
          BASE_DOMAIN: ${{ secrets.GCP_BASE_DOMAIN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          PULL_SECRET: ${{ secrets.RH_PULL_SECRET }}
          SSH_PUB_KEY: ${{ secrets.SSH_PUB_KEY }}
        run: |
          mkdir workspace
          envsubst < install-config-templaye.yaml > workspace/install-config.yaml
          
      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
          
      - name: Map Credentials for OpenShift
        run: |
          # The step above automatically generated the file and set GOOGLE_APPLICATION_CREDENTIALS.
          # GOOGLE_APPLICATION_CREDENTIALS for gsutil, GOOGLE_CREDENTIALS for openshift-install
          # Now, we just tell the OpenShift installer to look at that exact same file. 
          # >> appends a new line to the file without overwriting the file, > overwrites the file

          echo "GOOGLE_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS" >> $GITHUB_ENV


          # In GitHub Actions, if you just run export VAR=VALUE in one step, the next step in your pipeline will forget it completely. 
          # You have to write variables to a special system file called $GITHUB_ENV to make them stick around for the whole job.

      - name: Run OpenShift Installer
        run: |
          # 1. Run the official installer (allows workers to join cleanly)
          openshift-install create cluster --dir=workspace --log-level=info

      - name: Lock Down Firewall Rules
        if: success()
        run: |
          # 2. Get the GitHub Runner's temporary public IP
          RUNNER_IP=$(curl -s ifconfig.me)
          echo "Locking down cluster firewall rules to Runner IP: $RUNNER_IP"

          # 3. Find and patch the API firewall rule (Port 6443)
          API_RULE=$(gcloud compute firewall-rules list --filter="name~'${{ inputs.cluster_name }}.*api$'" --format="value(name)")
          if [ ! -z "$API_RULE" ]; then
            gcloud compute firewall-rules update $API_RULE --source-ranges="${RUNNER_IP}/32"
            echo "Successfully locked down $API_RULE"
          fi

          # 4. Find and patch the Ingress firewall rule (Ports 80/443)
          INGRESS_RULE=$(gcloud compute firewall-rules list --filter="name~'${{ inputs.cluster_name }}.*ingress'" --format="value(name)")
          if [ ! -z "$INGRESS_RULE" ]; then
            gcloud compute firewall-rules update $INGRESS_RULE --source-ranges="${RUNNER_IP}/32"
            echo "Successfully locked down $INGRESS_RULE"
          fi

      - name: Upload Cluster Metadata to GCS
        if: always() 
        run: |
          gsutil cp workspace/metadata.json gs://${{ secrets.GCP_STATE_BUCKET }}/${{ inputs.cluster_name }}/metadata.json

      - name: Output Login Credentials
        if: success() 
        env:
          BASE_DOMAIN: ${{ secrets.GCP_BASE_DOMAIN }}
        run: |
          # Pull the cluster name from the metadata file the installer leaves behind
          CLUSTER_NAME=$(jq -r .clusterName workspace/metadata.json)

          echo "======================================================"
          echo "CLUSTER DEPLOYMENT COMPLETE"
          echo "======================================================"
          # Dynamically builds the URL using the standard OpenShift routing format
          echo "Web Console URL: https://console-openshift-console.apps.${CLUSTER_NAME}.${BASE_DOMAIN}"
          echo "Username: kubeadmin"
          echo "Password: $(cat workspace/auth/kubeadmin-password)"
          echo "------------------------------------------------------"
          echo "To use the CLI, log into the Web Console, click your"
          echo "username in the top right, and select 'Copy login command'."
          echo "======================================================"